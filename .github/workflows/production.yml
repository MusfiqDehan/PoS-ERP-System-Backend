name: Production

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]
  workflow_dispatch:

jobs:
  ci:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sortorium_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sortorium_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DB_NAME: sortorium_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: MyPy
        run: mypy .

      - name: Pytest
        run: pytest

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

  deploy:
    name: Deploy to VPS (blue-green)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Sync code and deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=accept-new"
          RSYNC_RSH="ssh ${SSH_OPTS}"

          # Push checkout to VPS over SSH (VPS cannot git-fetch private HTTPS remotes).
          # Do not use git on the server for deploy sync — rsync is the source of truth.
          # Excludes: server-only secrets, local venvs, and paths that must survive --delete.
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.deploy-revision' \
            --exclude '.venv/' \
            --exclude '.venv*/' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude '.mypy_cache/' \
            --exclude 'staticfiles/' \
            --exclude 'media/' \
            --exclude '.env.prod' \
            --exclude '.env.pgbouncer.prod' \
            -e "${RSYNC_RSH}" \
            ./ "${VPS_USER}@${VPS_HOST}:${VPS_DEPLOY_PATH}/"

          ssh ${SSH_OPTS} "${VPS_USER}@${VPS_HOST}" \
            "set -euo pipefail
             cd '${VPS_DEPLOY_PATH}'
             chmod +x scripts/deploy/production.sh
             IMAGE_TAG='${IMAGE_TAG}' ./scripts/deploy/production.sh"
