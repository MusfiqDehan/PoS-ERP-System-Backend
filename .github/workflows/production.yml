name: Production

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]
  workflow_dispatch:

jobs:
  ci:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sortorium_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sortorium_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DB_NAME: sortorium_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: MyPy
        run: mypy .

      - name: Pytest
        run: pytest

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

  deploy:
    name: Deploy to VPS (blue-green)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Sync code and deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new "${VPS_USER}@${VPS_HOST}" \
            "set -euo pipefail
             cd '${VPS_DEPLOY_PATH}'
             git fetch origin '${IMAGE_TAG}'
             git reset --hard '${IMAGE_TAG}'
             chmod +x scripts/deploy/production.sh
             IMAGE_TAG='${IMAGE_TAG}' ./scripts/deploy/production.sh"
