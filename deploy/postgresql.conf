# Sortorium production PostgreSQL settings
# Tuned for db service mem_limit: 2560m in docker-compose.prod.yml

listen_addresses = '*'
port = 5432
hba_file = '/etc/postgresql/pg_hba.conf'

max_connections = 100
shared_buffers = 512MB
effective_cache_size = 1536MB
maintenance_work_mem = 128MB
work_mem = 8MB

wal_level = replica
max_wal_size = 1GB
min_wal_size = 256MB

checkpoint_completion_target = 0.9
random_page_cost = 1.1
effective_io_concurrency = 200

timezone = 'UTC'
log_timezone = 'UTC'
log_min_duration_statement = 1000
